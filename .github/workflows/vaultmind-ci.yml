name: VaultMind Next CI

on:
  pull_request:
    paths:
      - "VaultMind-Next/**"
      - ".github/workflows/vaultmind-ci.yml"
  push:
    branches: ["main"]
    paths:
      - "VaultMind-Next/**"
      - ".github/workflows/vaultmind-ci.yml"

permissions:
  contents: read

concurrency:
  group: vaultmind-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-scan:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    defaults:
      run:
        working-directory: VaultMind-Next
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            VaultMind-Next/requirements.lock
            VaultMind-Next/requirements-test.lock

      - name: Install exact test environment
        run: |
          python -m pip install --no-deps -r requirements.lock
          python -m pip install --no-deps -r requirements-test.lock
          python -m pip install --no-build-isolation --no-deps .

      - name: Run tests
        run: python -m pytest -q -p no:cacheprovider

      - name: Build minimal runtime image
        run: docker build --pull=false --tag vaultmind-next:ci .

      - name: Smoke-test unprivileged runtime
        run: |
          docker run --rm --network none vaultmind-next:ci \
            python -c "import cryptography, fastapi, vaultmind_next, webauthn"
          docker run --rm --network none vaultmind-next:ci \
            sh -c 'test "$(id -u)" = 999 && test ! -d /usr/local/lib/python3.13/site-packages/pip && test ! -d /usr/local/lib/python3.13/site-packages/setuptools'

      - name: Export candidate without Docker socket access
        run: docker save --output /tmp/vaultmind-next-ci.tar vaultmind-next:ci

      - name: Block high or critical findings and embedded secrets
        working-directory: /
        run: |
          docker run --rm --network bridge \
            -v /tmp/vaultmind-next-ci.tar:/scan/image.tar:ro \
            aquasec/trivy@sha256:cffe3f5161a47a6823fbd23d985795b3ed72a4c806da4c4df16266c02accdd6f \
            image --input /scan/image.tar --scanners vuln,secret \
            --severity HIGH,CRITICAL --exit-code 1 --skip-version-check
