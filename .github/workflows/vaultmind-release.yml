name: VaultMind Next Signed Release

on:
  workflow_dispatch:
  push:
    tags:
      - "vaultmind-v*"

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: vaultmind-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            VaultMind-Next/requirements.lock
            VaultMind-Next/requirements-test.lock

      - name: Test exact source
        working-directory: VaultMind-Next
        run: |
          python -m pip install --no-deps -r requirements.lock
          python -m pip install --no-deps -r requirements-test.lock
          python -m pip install --no-build-isolation --no-deps .
          python -m pytest -q -p no:cacheprovider

      - name: Set image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/vaultmind-next" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build and push candidate
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./VaultMind-Next
          file: ./VaultMind-Next/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.name }}:candidate-${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=vaultmind-release
          cache-to: type=gha,mode=max,scope=vaultmind-release

      - name: Scan the pushed digest before release tagging
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          docker run --rm --network bridge \
            -v "$HOME/.docker/config.json:/root/.docker/config.json:ro" \
            aquasecurity/trivy@sha256:cffe3f5161a47a6823fbd23d985795b3ed72a4c806da4c4df16266c02accdd6f \
            image "${IMAGE_NAME}@${DIGEST}" --scanners vuln,secret \
            --severity HIGH,CRITICAL --exit-code 1 --skip-version-check

      - name: Extract the image SBOM
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          docker pull "${IMAGE_NAME}@${DIGEST}"
          container_id="$(docker create "${IMAGE_NAME}@${DIGEST}")"
          trap 'docker rm -f "$container_id" >/dev/null 2>&1 || true' EXIT
          docker cp "$container_id:/app/sbom.spdx.json" ./sbom.spdx.json
          test -s ./sbom.spdx.json

      - name: Add the release tag to the scanned digest
        id: release
        shell: bash
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            version="${GITHUB_REF_NAME#vaultmind-v}"
            [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
            release_tag="$version"
          else
            release_tag="manual-${GITHUB_SHA::12}"
          fi
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${release_tag}" "${IMAGE_NAME}@${DIGEST}"
          echo "tag=${release_tag}" >> "$GITHUB_OUTPUT"

      - name: Install signature verifier
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: "v3.0.6"

      - name: Sign and verify the image digest
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          DIGEST: ${{ steps.build.outputs.digest }}
          CERTIFICATE_IDENTITY: ${{ github.server_url }}/${{ github.repository }}/.github/workflows/vaultmind-release.yml@${{ github.ref }}
        run: |
          cosign sign --yes "${IMAGE_NAME}@${DIGEST}"
          cosign verify "${IMAGE_NAME}@${DIGEST}" \
            --certificate-identity "$CERTIFICATE_IDENTITY" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"

      - name: Publish build provenance
        uses: actions/attest@f6bf1532d7d6793fce74eac584813a8eee607999 # v4
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Publish SBOM attestation
        uses: actions/attest@f6bf1532d7d6793fce74eac584813a8eee607999 # v4
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: ./sbom.spdx.json
          push-to-registry: true

      - name: Verify GitHub provenance
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: gh attestation verify "oci://${IMAGE_NAME}@${DIGEST}" --repo "$GITHUB_REPOSITORY"
